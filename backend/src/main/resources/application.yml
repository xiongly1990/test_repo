server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: parent-kid-checkin
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/parent_kid_checkin?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 7859945
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.parentkid.checkin.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: parent-kid-checkin-secret-key-2024
  expire: 86400000

knife4j:
  enable: true
  openapi:
    title: 亲子学习打卡系统API
    description: 亲子学习打卡系统接口文档
    version: 1.0.0
    concat: admin

logging:
  level:
    com.parentkid.checkin: debug

upload:
  path: ./uploads
